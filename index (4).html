<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Clicker - The Quest</title>
    <style>
        :root {
            --cookie-shadow: rgba(0, 0, 0, 0.3);
            --bg-color: #f1d3a1;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            background-image: radial-gradient(#d4a373 1px, transparent 1px);
            background-size: 40px 40px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none; /* Prevents text highlighting while clicking fast */
        }

        /* Top Right Counter */
        #counter-container {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 3px solid #6d4c41;
        }

        #counter-label {
            font-size: 14px;
            color: #6d4c41;
            font-weight: bold;
            text-transform: uppercase;
            display: block;
            text-align: center;
        }

        #cookie-count {
            font-size: 32px;
            font-weight: 900;
            color: #3e2723;
        }

        /* Central Cookie Area */
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #cookie {
            width: 300px;
            height: 300px;
            cursor: pointer;
            transition: transform 0.05s active; /* Instant feedback */
            filter: drop-shadow(0 10px 20px var(--cookie-shadow));
            border-radius: 50%;
        }

        #cookie:hover {
            transform: scale(1.05);
        }

        #cookie:active {
            transform: scale(0.92);
        }

        /* Floating Text (+1) Animation */
        .plus-one {
            position: absolute;
            color: #3e2723;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px);
            }
        }

        /* Background Pulse Feedback */
        .pulse {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            animation: pulseEffect 0.4s ease-out;
        }

        @keyframes pulseEffect {
            from { transform: scale(1); opacity: 1; }
            to { transform: scale(1.5); opacity: 0; }
        }

    </style>
</head>
<body>

    <div id="counter-container">
        <span id="counter-label">Cookies Baked</span>
        <div id="cookie-count">0</div>
    </div>

    <div class="game-area">
        <!-- SVG Cookie so it looks crisp on all screens -->
        <svg id="cookie" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" fill="#d2691e" stroke="#8b4513" stroke-width="2"/>
            <!-- Chocolate Chips -->
            <circle cx="30" cy="30" r="4" fill="#3e2723"/>
            <circle cx="70" cy="35" r="5" fill="#3e2723"/>
            <circle cx="50" cy="55" r="4" fill="#3e2723"/>
            <circle cx="40" cy="75" r="5" fill="#3e2723"/>
            <circle cx="65" cy="70" r="4" fill="#3e2723"/>
            <circle cx="25" cy="55" r="3" fill="#3e2723"/>
            <circle cx="55" cy="20" r="3" fill="#3e2723"/>
        </svg>
    </div>

    <script>
        let count = 0;
        const cookie = document.getElementById('cookie');
        const display = document.getElementById('cookie-count');

        cookie.addEventListener('mousedown', (e) => {
            // 1. Increase count
            count++;
            display.innerText = count.toLocaleString();

            // 2. Create Floating +1 Text
            createFloatingText(e.clientX, e.clientY);

            // 3. Create Pulse Effect
            createPulse(e.clientX, e.clientY);
        });

        function createFloatingText(x, y) {
            const plus = document.createElement('div');
            plus.className = 'plus-one';
            plus.innerText = '+1';
            
            // Center the text on the mouse click
            plus.style.left = (x - 10) + 'px';
            plus.style.top = (y - 20) + 'px';
            
            document.body.appendChild(plus);

            // Remove element from DOM after animation finishes
            setTimeout(() => {
                plus.remove();
            }, 800);
        }

        function createPulse() {
            const pulse = document.createElement('div');
            pulse.className = 'pulse';
            
            // Position the pulse behind the cookie
            const cookieRect = cookie.getBoundingClientRect();
            pulse.style.left = cookieRect.left + 'px';
            pulse.style.top = cookieRect.top + 'px';
            
            document.querySelector('.game-area').appendChild(pulse);

            setTimeout(() => {
                pulse.remove();
            }, 400);
        }
    </script>
</body>
</html>
